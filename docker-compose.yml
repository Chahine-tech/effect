name: api-test

services:
  postgres:
    image: postgres:16-alpine
    container_name: api-test-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-api}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-api}
      POSTGRES_DB: ${POSTGRES_DB:-api}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-api} -d ${POSTGRES_DB:-api}",
        ]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 5s

volumes:
  postgres-data:
    driver: local
